<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="display-4" data-i18n="title">RSS агрегатор</h1>
      <p class="lead" data-i18n="subtitle">Начните читать RSS сегодня! Это легко, это красиво.</p>

      <form id="rss-form" class="mt-4">
        <div class="mb-3">
          <label for="rss-url" class="form-label" data-i18n="form.label">Ссылка RSS</label>
          <input
            type="url"
            class="form-control"
            id="rss-url"
            placeholder="Введите ссылку"
            required
          />
          <div class="invalid-feedback"></div>
        </div>
        <button type="submit" class="btn btn-primary" data-i18n="form.submit">Добавить</button>
      </form>

      <div class="mt-3 text-muted">
        <small>Пример: <a href="https://lorem-rs.shexlet.app/feed" target="_blank">https://lorem-rs.shexlet.app/feed</a></small>
      </div>

      <div id="feeds-container" class="mt-4"></div>
      <div id="posts-container" class="mt-4"></div>
      <div class="modal fade" id="postModal" tabindex="-1">
   <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="postModalTitle">Заголовок</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="postModalBody">
        Описание поста
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
        <a href="#" id="postModalLink" class="btn btn-primary" target="_blank">Читать полностью</a>
      </div>
    </div>
  </div>
  </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
