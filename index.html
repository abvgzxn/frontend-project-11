<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSS агрегатор</title>
</head>
<body>
  <div class="container mt-5">
    <h1 id="app-title">RSS агрегатор</h1>
    <form id="rss-form">
      <div class="mb-3">
        <label for="rss-url" class="form-label">Ссылка RSS</label>
        <input
          type="url"
          class="form-control"
          id="rss-url"
          placeholder="Введите URL RSS"
          required
        />
        <div class="invalid-feedback"></div>
      </div>
      <button type="submit" class="btn btn-primary">Добавить</button>
    </form>
    <div id="feeds-container" class="mt-4"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
